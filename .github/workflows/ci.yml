name: ci-checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:

  Checks:
  
    runs-on: ubuntu-latest

    env:
      LABVIEW_VERSION_NUMBER: '20.1'
      LABVIEW_VERSION_YEAR: '2020'
      LABVIEW_BITNESS: '64'

    steps:

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # cache: 'pip'
          

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pylavi
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv
          uv pip install pylavi

      - name: Run pylavi Tests
        run: |
          echo running pylavi tests
          source .venv/bin/activate
          vi_validate \
            --path source \
            --path tests \
            --gt 20 --lt 21 \
            --skip *.vit \
            --no-code \
            --breakpoints
          echo finished pylavi tests

  Build:

    #runs-on: ubuntu-main
    runs-on: ubuntu-latest-8-cores

    container:
      image: nationalinstruments/labview:2025q3patch1-linux
      options: --user root --privileged --cpus 8 --memory 32g
      

    env:
      VIPM_SERIAL_NUMBER: ${{ secrets.VIPM_SERIAL_NUMBER }}
      VIPM_FULL_NAME: ${{ secrets.VIPM_FULL_NAME }}
      VIPM_EMAIL: ${{ secrets.VIPM_EMAIL }}
      Display: 99

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Cache VIPM packages
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       /usr/local/jki/vipm/cache/
      #     # /usr/local/jki/vipm/db/
      #     # /usr/local/natinst/LabVIEW*/
      #     key: ${{ runner.os }}-vipm-${{ hashFiles('project.vipc') }}

      - name: Install VIPM
        run: |
          apt-get update \
            && apt-get install -y wget \
            && rm -rf /var/lib/apt/lists/*
          mkdir -p /usr/local/jki/vipm /etc/jki \
            && touch /usr/local/jki/vipm/Settings.ini /etc/jki/jki.conf
          wget --no-verbose -O /tmp/vipm.deb \
            https://packages.jki.net/vipm/preview/vipm_latest_preview_amd64.deb \
            && dpkg -i /tmp/vipm.deb \
            && rm /tmp/vipm.deb
          vipm --version

      - name: Setup VIPM Settings
        run: |
          echo "[General]" > /usr/local/jki/vipm/Settings.ini
          echo "check for updates on startup?=\"FALSE\"" >> /usr/local/jki/vipm/Settings.ini
          echo "Check new ver. of App. on startup?=\"FALSE\"" >> /usr/local/jki/vipm/Settings.ini
          echo "Suppress Download warning?=\"TRUE\"" >> /usr/local/jki/vipm/Settings.ini
          echo "Mass Compile After Package Install?=\"FALSE\"" >> /usr/local/jki/vipm/Settings.ini
          echo "IsFirstLaunch=\"FALSE\"" >> /usr/local/jki/vipm/Settings.ini

      - name: Setup LabVIEW Settings
        run: |
          echo "server.tcp.access=\"+127.0.0.1:+localhost:+*\"" >> /root/natinst/.config/LabVIEW-2025/labview.conf
          echo "server.tcp.access=\"+127.0.0.1:+localhost:+*\"" >> /root/natinst/.config/LabVIEW-2025/labview64.conf
          echo "server.tcp.access=\"+127.0.0.1:+localhost:+*\"" >> /root/natinst/.config/LabVIEW-2025/labviewprofull.conf

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3
      #   with:
      #     detach: true
      #     sudo: false

      - name: Activate VIPM
        timeout-minutes: 5
        run: |
          echo "Activating VIPM..."; \
          vipm activate \
            --serial-number "$VIPM_SERIAL_NUMBER" \
            --name "$VIPM_FULL_NAME" \
            --email "$VIPM_EMAIL" & \
          sleep 10; \
          pkill -f "vipm"; \
          vipm activate \
            --serial-number "$VIPM_SERIAL_NUMBER" \
            --name "$VIPM_FULL_NAME" \
            --email "$VIPM_EMAIL"
          echo "Refreshing VIPM package list..."
          vipm package-list-refresh
          echo "Installing oglib_boolean package..."
          vipm install oglib_boolean
          echo "Listing installed VIPM packages..."
          vipm list --installed

      # - name: Refresh package list
      #   run: vipm package-list-refresh

      # - name: Install project dependencies
      #   run: vipm install --labview-version 2025 source/.vipc

      # - name: Build package
      #   run: vipm build --labview-version 2025 source/.vipb

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-package
          path: |
            *.vip

