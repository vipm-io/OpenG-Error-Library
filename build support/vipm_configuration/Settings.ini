Features 5.feature name="VIPB LabVIEW Save Version"
Features 5.display name="Use "Save Version" when Building Packages"
Features 5.enabled="TRUE"
Features 5.description="VI Package Builder allows setting the LabVIEW-version compatibility requirement for the built package. Historically, it is only possible to set this to the version (or greater) of LabVIEW used to build the package.\0A\0ANow, starting in LabVIEW 2023, a project can be configured to respect a Save Version <https://www.ni.com/docs/en-US/bundle/labview-api-ref/page/properties-and-methods/vi-server/project/setsaveversion.html> setting, which defines the file format of all the source code (.vi, .ctl, .lvclass, etc.) within the project. This allows developers to use newer versions of LabVIEW for working on the project and editing the code, without "upgrading" the format/version of the files (which historically would then require ALL developers to use the same version of LabVIEW.\0A\0ANotes:\0A\0A    This is not available in VIPM Free Edition. It is available in VIPM Pro Edtion and also for (non-commercial only) use with VIPM Community Edition.\0A    This requires placing a .lvversion text file in your VI Package's Source Folder that contains the Save Version in the YY.Q (two-digit year with quarter, such as 19.0, 26.0, etc.). See the LabVIEW Project .lvproj Save Version drop-down selector for possible values."
Features 5.issue url="https://github.com/vipm-io/vipm-desktop-issues/issues/127"
Features 5.issue number="127"
Features 5.feature type="1"
Features 5.selectable="TRUE"
